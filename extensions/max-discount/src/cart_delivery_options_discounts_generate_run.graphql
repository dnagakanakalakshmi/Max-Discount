query DeliveryInput($collectionIds: [ID!]) {
  cart {
    cost{
      subtotalAmount{
        amount
      }
    }
    lines{
      quantity
      cost{
        subtotalAmount{
          amount
        }
      }
      merchandise{
        ... on ProductVariant{
          product{
            id
            inAnyCollection(ids: $collectionIds)
          }
        }
      }
    }
    deliveryGroups {
      id
    }
  }
  discount {
    discountClasses
    metafield(namespace: "$app", key: "config") {
      jsonValue
    }
  }
}